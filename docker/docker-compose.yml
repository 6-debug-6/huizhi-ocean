# ============================================================
# 汇智海洋 - Docker Compose 编排文件（Host 网络模式）
# 适用架构：LoongArch (loongarch64) / x86_64
#
# 使用方法：
#   1. 执行：docker-compose -f docker/docker-compose.yml build
#   2. 执行：docker-compose -f docker/docker-compose.yml up -d
#   3. 访问：http://<服务器IP>
# ============================================================

version: "3.8"

services:
  # ==================== 后端服务 ====================
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: huizhi-backend
    network_mode: host
    volumes:
      - ../backend/data:/app/data
      - ../backend/.env:/app/.env:ro
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped

  # ==================== 前端服务 ====================
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: huizhi-frontend
    network_mode: host
    depends_on:
      - backend
    restart: unless-stopped
